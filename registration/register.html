<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Fort Canning Dog Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">

  <style>
    :root { 
      --cream: #F9F8F6; --cream-border: #E8E5DF; --green: #3D6B4F; 
      --green-deep: #274734; --green-light: #EAF3EC; --text: #2D2A26; 
      --text-soft: #5C5955; --white: #FFFFFF; --danger: #D9534F; 
      --danger-light: #FDF2F2; --amber-mid: #C8B99A; --r-md: 12px; --r-lg: 16px; --r-xl: 24px; --r-pill: 99px; 
    }

    body.register-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--cream);
      background-image: radial-gradient(circle, #C8B99A 1px, transparent 1px);
      background-size: 32px 32px;
      margin: 0;
    }

    /* ── Updated Public Navigation ── */
    .nav-bar {
      background: var(--white);
      border-bottom: 1.5px solid var(--cream-border);
      padding: 0 40px;
      height: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-sizing: border-box;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-logo-icon { font-size: 1.5rem; }

    .nav-logo-text {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--green-deep);
      line-height: 1;
    }

    .nav-logo-sub {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      color: var(--text-soft);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-links { display: flex; gap: 32px; list-style: none; margin: 0; padding: 0; }
    .nav-links a { text-decoration: none; color: var(--text-soft); font-weight: 500; font-size: 0.95rem; }
    .nav-links a:hover { color: var(--green); }

    .nav-cta { display: flex; gap: 12px; }
    .btn-nav { font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; text-decoration: none; padding: 10px 20px; border-radius: var(--r-pill); transition: 0.2s; }
    .btn-ghost { color: var(--green); }
    .btn-outline { border: 1.5px solid var(--green); color: var(--green); }
    .btn-outline:hover { background: var(--green-light); }

    /* ── Register UI ── */
    .register-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }
    .register-card { background: var(--white); border: 1.5px solid var(--cream-border); border-radius: var(--r-xl); box-shadow: 0 10px 30px rgba(45,42,38,0.05); padding: 48px 44px 40px; width: 100%; max-width: 500px; position: relative; overflow: hidden; }
    .register-heading { font-family: 'Fraunces', serif; font-size: clamp(1.6rem, 4vw, 2rem); font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: 6px; }
    .register-heading em { color: var(--green); font-style: italic; }
    .register-sub { font-size: 0.9rem; color: var(--text-soft); margin-bottom: 30px; }

    .register-form { display: flex; flex-direction: column; gap: 18px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .form-input { font-family: 'DM Sans', sans-serif; font-size: 0.95rem; background: var(--cream); border: 1.5px solid var(--cream-border); border-radius: var(--r-md); padding: 12px 16px; width: 100%; box-sizing: border-box; transition: 0.2s; }
    .form-input:focus { outline: none; border-color: var(--green); background: var(--white); }

    .password-strength { margin-top: 4px; display: flex; gap: 4px; }
    .strength-bar { flex: 1; height: 3px; border-radius: 99px; background: var(--cream-border); transition: background .3s; }
    .strength-bar.weak { background: #E05C4A; }
    .strength-bar.strong { background: var(--green-mid, #3D6B4F); }

    .btn-register { background: var(--green); color: var(--white); font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 600; border: none; border-radius: var(--r-pill); padding: 14px 32px; cursor: pointer; width: 100%; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s; }
    .btn-register:hover { background: var(--green-deep); }
    
    .register-login { text-align: center; font-size: 0.88rem; color: var(--text-soft); margin-top: 20px; padding-top: 20px; border-top: 1.5px solid var(--cream-border); }
    .register-login a { color: var(--green); text-decoration: none; font-weight: 600; }

    @media (max-width: 768px) { .nav-links { display: none; } .nav-bar { padding: 0 20px; } }
  </style>
</head>

<body class="register-page">

  <nav class="nav-bar">
    <a href="../index.html" class="nav-logo">
      <div class="nav-logo-icon">🐾</div>
      <div class="nav-logo-text">
        Fort Canning
        <span class="nav-logo-sub">Dog Camp · Singapore</span>
      </div>
    </a>
    
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../index.html#about">About Us</a></li>
      <li><a href="../index.html#contact">Contact</a></li>
	  <li><a href="../index.html#contact">FAQ</a></li>
    </ul>

    <div class="nav-cta">
      <a href="../login.html" class="btn-nav btn-ghost" style="color: var(--green-deep);">Log In</a>
      <a href="register.html" class="btn-nav btn-outline" style="background: var(--green-light);">Register</a>
    </div>
  </nav>

  <div class="register-wrapper">
    <div class="register-card">
      <h1 class="register-heading">Join the <em>pack!</em> 🐕</h1>
      <p class="register-sub">Create your account and get your pup on the trail.</p>

      <form class="register-form" id="registrationForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">🙋 First Name</label>
            <input class="form-input" type="text" id="firstName" required placeholder="Jane">
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input class="form-input" type="text" id="lastName" required placeholder="Tan">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">📧 Email Address</label>
          <input class="form-input" type="email" id="email" required placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label class="form-label">🔒 Password</label>
          <input class="form-input" type="password" id="password" required placeholder="Create a strong password">
          <div class="password-strength" id="strengthBars">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
            <div class="strength-bar" id="bar4"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">🔑 Confirm Password</label>
          <input class="form-input" type="password" id="confirmPassword" required placeholder="Repeat your password">
        </div>

        <button class="btn-register" type="submit">Create my account 🐾</button>
      </form>

      <div class="register-login">
        Already have an account? <a href="../login.html">Login here! 🐾</a>
      </div>
    </div>
  </div>

  <script>
    const registrationForm = document.getElementById('registrationForm');

    registrationForm.addEventListener('submit', function(event) {
      event.preventDefault(); 
      
      const emailInput = document.getElementById('email').value;
      const passwordInput = document.getElementById('password').value;
      const confirmInput = document.getElementById('confirmPassword').value;

      if (passwordInput !== confirmInput) {
        alert("Passwords do not match!");
        return;
      }

      // Save to localStorage
      const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
      if (users.some(user => user.email === emailInput)) {
        alert("Email already registered!");
        return;
      }

      users.push({
        email: emailInput,
        password: passwordInput,
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value
      });

      localStorage.setItem('registeredUsers', JSON.stringify(users));
      window.location.href = 'register_confirmation.html';
    });

    // Password Strength UI Logic
    const passwordInput = document.getElementById('password');
    const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
    
    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      let score = val.length > 0 ? (val.length > 8 ? 4 : 2) : 0;
      bars.forEach((bar, i) => {
        bar.className = 'strength-bar' + (i < score ? (score > 2 ? ' strong' : ' weak') : '');
      });
    });
  </script>
</body>
</html>
