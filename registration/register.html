<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Fort Canning Dog Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">

  <style>
    body.register-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--cream);
      background-image: radial-gradient(circle, #C8B99A 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .nav-bar {
      background: var(--white);
      border-bottom: 1.5px solid var(--cream-border);
      padding: 0 40px;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-sizing: border-box;
    }
    .nav-logo { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 600; color: var(--green-deep); text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { text-decoration: none; color: var(--text-soft); font-weight: 500; font-size: 0.9rem; transition: color 0.2s; }
    .register-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }
    .register-card { background: var(--white); border: 1.5px solid var(--cream-border); border-radius: var(--r-xl); box-shadow: var(--shadow-lg); padding: 48px 44px 40px; width: 100%; max-width: 500px; position: relative; overflow: hidden; }
    .register-heading { font-family: 'Fraunces', serif; font-size: clamp(1.6rem, 4vw, 2rem); font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: 6px; }
    .register-heading em { color: var(--green); font-style: italic; }
    .register-sub { font-size: 0.9rem; color: var(--text-faint); margin-bottom: 30px; }
    .register-form { display: flex; flex-direction: column; gap: 18px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .form-input { font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--text); background: var(--cream); border: 1.5px solid var(--cream-border); border-radius: var(--r-md); padding: 12px 16px; width: 100%; box-sizing: border-box; }
    .password-strength { margin-top: 4px; display: flex; gap: 4px; }
    .strength-bar { flex: 1; height: 3px; border-radius: 99px; background: var(--cream-border); transition: background .3s; }
    .strength-bar.weak { background: #E05C4A; }
    .strength-bar.fair { background: var(--amber-mid); }
    .strength-bar.strong { background: var(--green-mid); }
    .btn-register { background: var(--green); color: var(--white); font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 600; border: none; border-radius: var(--r-pill); padding: 14px 32px; cursor: pointer; width: 100%; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .register-login { text-align: center; font-size: 0.88rem; color: var(--text-soft); margin-top: 20px; padding-top: 20px; border-top: 1.5px solid var(--cream-border); }
    .register-login a { color: var(--green); text-decoration: none; font-weight: 600; }
  </style>
</head>

<body class="register-page">

  <nav class="nav-bar">
    <a href="../index.html" class="nav-logo">🌿 Admin Portal</a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="../login.html">Log In</a>
      <a href="register.html" style="color: var(--green);">Register</a>
    </div>
  </nav>

  <div class="register-wrapper">
    <div class="register-card">
      <h1 class="register-heading">Join the <em>pack!</em> 🐕</h1>
      <p class="register-sub">Create your account and get your pup on the trail.</p>

      <form class="register-form" id="registrationForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="firstName">🙋 First Name</label>
            <input class="form-input" type="text" id="firstName" required placeholder="Jane">
          </div>
          <div class="form-group">
            <label class="form-label" for="lastName">Last Name</label>
            <input class="form-input" type="text" id="lastName" required placeholder="Tan">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">📧 Email Address</label>
          <input class="form-input" type="email" id="email" required placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">🔒 Password</label>
          <input class="form-input" type="password" id="password" required placeholder="Create a strong password">
          <div class="password-strength" id="strengthBars">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
            <div class="strength-bar" id="bar4"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">🔑 Confirm Password</label>
          <input class="form-input" type="password" id="confirmPassword" required placeholder="Repeat your password">
        </div>

        <button class="btn-register" type="submit">Create my account 🐾</button>
      </form>

      <div class="register-login">
        Already have an account? <a href="../login.html">Login here! 🐾</a>
      </div>
    </div>
  </div>

  <script>
    const registrationForm = document.getElementById('registrationForm');

    registrationForm.addEventListener('submit', function(event) {
      event.preventDefault(); 
      
      const emailInput = document.getElementById('email').value;
      const passwordInput = document.getElementById('password').value;
      const confirmInput = document.getElementById('confirmPassword').value;

      if (passwordInput !== confirmInput) {
        alert("Passwords do not match!");
        return;
      }

      // Save to localStorage
      const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
      if (users.some(user => user.email === emailInput)) {
        alert("Email already registered!");
        return;
      }

      users.push({
        email: emailInput,
        password: passwordInput,
        firstName: document.getElementById('firstName').value
      });

      localStorage.setItem('registeredUsers', JSON.stringify(users));
      window.location.href = 'register_confirmation.html';
    });

    // Password Strength UI Logic
    const passwordInput = document.getElementById('password');
    const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
    
    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      let score = val.length > 0 ? (val.length > 8 ? 4 : 2) : 0;
      bars.forEach((bar, i) => {
        bar.className = 'strength-bar' + (i < score ? (score > 2 ? ' strong' : ' weak') : '');
      });
    });
  </script>
</body>
</html>
