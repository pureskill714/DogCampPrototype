<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal – Generate Bookings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root { 
      --cream: #F9F8F6; --cream-border: #E8E5DF; --green: #3D6B4F; 
      --green-deep: #274734; --green-light: #EAF3EC; --text: #2D2A26; 
      --text-soft: #5C5955; --white: #FFFFFF; --danger: #D9534F; 
      --danger-light: #FDF2F2; --gray-light: #F0F0F0; 
      --r-md: 12px; --r-lg: 16px; --r-xl: 24px; --r-pill: 99px; 
    }

    body { 
      font-family: 'DM Sans', sans-serif; background-color: var(--cream); 
      background-image: radial-gradient(circle, #C8B99A 1px, transparent 1px); 
      background-size: 32px 32px; color: var(--text); margin: 0; padding: 0; 
    }

    /* Navigation Bar */
    .nav-bar {
      background: var(--white);
      border-bottom: 1.5px solid var(--cream-border);
      padding: 0 40px;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-sizing: border-box;
    }
    .nav-logo { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 600; color: var(--green-deep); text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { text-decoration: none; color: var(--text-soft); font-weight: 500; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--green); }

    .admin-container { 
      width: 100%; max-width: 900px; margin: 40px auto; 
      display: flex; flex-direction: column; gap: 40px; padding: 0 20px;
    }

    .page-title { font-family: 'Fraunces', serif; font-size: 2.5rem; margin: 0; color: var(--green-deep); }
    .admin-card { background: var(--white); border: 1.5px solid var(--cream-border); border-radius: var(--r-xl); padding: 32px; box-shadow: 0 8px 24px rgba(45,42,38,0.04); }
    .card-header { font-family: 'Fraunces', serif; font-size: 1.5rem; margin-top: 0; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--cream-border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .dashboard-controls { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; background: var(--cream); padding: 16px; border-radius: var(--r-md); border: 1px solid var(--cream-border); }
    .date-range-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    input[type="text"], input[type="date"], input[type="time"], select { width: 100%; padding: 12px 16px; border: 1.5px solid var(--cream-border); border-radius: var(--r-md); font-family: 'DM Sans', sans-serif; font-size: 1rem; box-sizing: border-box; }
    input:focus, select:focus { outline: none; border-color: var(--green); }
    .date-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 16px; align-items: flex-end; background: var(--cream); padding: 16px; border-radius: var(--r-md); margin-bottom: 16px; border: 1px solid var(--cream-border); }
    .form-error { background-color: var(--danger-light); color: var(--danger); padding: 12px 16px; border-radius: var(--r-md); margin-top: 10px; margin-bottom: 16px; font-size: 0.95rem; font-weight: 600; display: none; border: 1px solid rgba(217, 83, 79, 0.2); }
    .btn { font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; border: none; border-radius: var(--r-pill); padding: 12px 24px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; text-decoration: none; }
    .btn-primary { background: var(--green); color: var(--white); width: 100%; justify-content: center; font-size: 1.1rem; padding: 16px; }
    .btn-outline { background: transparent; border: 1.5px solid var(--green); color: var(--green); }
    .btn-delete { background: var(--danger-light); color: var(--danger); padding: 10px 16px; }
    .btn-remove-row { background: transparent; color: var(--text-soft); font-size: 1.2rem; padding: 10px; }
    .session-list { display: flex; flex-direction: column; gap: 20px; }
    .session-item { background: var(--white); border: 1.5px solid var(--cream-border); border-radius: var(--r-lg); padding: 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }
    .status-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: var(--r-pill); font-weight: 600; }
    .badge-upcoming { background: var(--green-light); color: var(--green-deep); }
    .slots-badge { display: inline-block; background: var(--cream); border: 1px solid var(--cream-border); padding: 6px 12px; border-radius: var(--r-pill); font-size: 0.85rem; font-weight: 600; }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html" class="nav-logo">🌿 Admin Portal</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="generate-booking.html" class="active">Generate Booking</a>
      <a href="view-bookings.html">View Bookings</a>
      <a href="#">External Users</a>
    </div>
  </nav>

  <div class="admin-container">
    <h1 class="page-title">⚙️ Generate Bookings</h1>

    <div class="admin-card">
      <h2 class="card-header">Create New Camp Package</h2>
      <div class="form-group">
        <label for="packageName">Package Title</label>
        <input type="text" id="packageName" placeholder="e.g., 3-Day Agility & Socialization Camp">
      </div>
      <div class="form-group">
        <label>Session Dates & Timings</label>
        <div id="dateRowsContainer"></div>
        <button class="btn btn-outline" id="addDateBtn" style="margin-top: 8px;">+ Add Another Date</button>
      </div>
      <div id="formError" class="form-error"></div>
      <button class="btn btn-primary" id="createSessionBtn">Publish Session Package</button>
    </div>

    <div class="admin-card">
      <div class="dashboard-controls">
        <h2 class="card-header" style="margin-bottom: 0; border-bottom: none;">Package Dashboard</h2>
        <div class="filter-row">
          <select id="sessionFilter" style="width: auto;">
            <option value="upcoming">Upcoming Sessions</option>
            <option value="all">All Sessions</option>
            <option value="past">Past Sessions</option>
            <option value="cancelled">Cancelled Sessions</option>
          </select>
        </div>
      </div>
      <div id="sessionListContainer" class="session-list" style="margin-top: 24px;"></div>
    </div>
  </div>

  <script>
    /* Logic remains identical to your original generate-booking.html file */
    let dateRows = [{ id: Date.now(), date: '', startTime: '', endTime: '' }];
    let allSessions = JSON.parse(localStorage.getItem('campSessions')) || []; 

    const dateRowsContainer = document.getElementById('dateRowsContainer');
    const addDateBtn = document.getElementById('addDateBtn');
    const createSessionBtn = document.getElementById('createSessionBtn');
    const sessionListContainer = document.getElementById('sessionListContainer');
    const packageNameInput = document.getElementById('packageName');
    const formError = document.getElementById('formError');
    const sessionFilter = document.getElementById('sessionFilter');

    function renderDateRows() {
      dateRowsContainer.innerHTML = '';
      dateRows.forEach((row, index) => {
        const rowEl = document.createElement('div');
        rowEl.className = 'date-row';
        rowEl.innerHTML = `
          <div><label style="font-size: 0.85rem;">Date ${index + 1}</label><input type="date" class="date-input" data-id="${row.id}" value="${row.date}"></div>
          <div><label style="font-size: 0.85rem;">Start</label><input type="time" class="start-input" data-id="${row.id}" value="${row.startTime}"></div>
          <div><label style="font-size: 0.85rem;">End</label><input type="time" class="end-input" data-id="${row.id}" value="${row.endTime}"></div>
          ${dateRows.length > 1 ? `<button class="btn btn-remove-row" onclick="removeDateRow(${row.id})">✕</button>` : '<div></div>'}
        `;
        dateRowsContainer.appendChild(rowEl);
      });
    }

    addDateBtn.addEventListener('click', () => {
      dateRows.push({ id: Date.now(), date: '', startTime: '', endTime: '' });
      renderDateRows();
    });

    window.removeDateRow = function(id) {
      dateRows = dateRows.filter(row => row.id !== id);
      renderDateRows();
    };

    function renderDashboard() {
      sessionListContainer.innerHTML = '';
      allSessions.forEach(session => {
        const item = document.createElement('div');
        item.className = 'session-item';
        item.innerHTML = `
          <div style="flex: 1;">
            <h3>${session.title} <span class="status-badge badge-upcoming">${session.status}</span></h3>
            <div class="slots-badge">🐾 ${session.slotsAvailable} / ${session.totalSlots} Slots</div>
          </div>
          <button class="btn btn-delete" onclick="cancelSession(${session.id})">Cancel</button>
        `;
        sessionListContainer.appendChild(item);
      });
    }

    createSessionBtn.addEventListener('click', () => {
      const newSession = { id: Date.now(), title: packageNameInput.value, status: 'active', totalSlots: 6, slotsAvailable: 6 };
      allSessions.unshift(newSession);
      localStorage.setItem('campSessions', JSON.stringify(allSessions));
      renderDashboard();
    });

    renderDateRows();
    renderDashboard();
  </script>
</body>
</html>
