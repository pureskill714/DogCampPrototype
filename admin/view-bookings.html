<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal – View Bookings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root { 
      --cream: #F9F8F6; --cream-border: #E8E5DF; --green: #3D6B4F; 
      --green-deep: #274734; --green-light: #EAF3EC; --text: #2D2A26; 
      --text-soft: #5C5955; --white: #FFFFFF; --danger: #D9534F; 
      --danger-light: #FDF2F2; --gray-light: #F0F0F0; 
      --r-md: 12px; --r-lg: 16px; --r-xl: 24px; --r-pill: 99px; 
    }
    
    body { 
      font-family: 'DM Sans', sans-serif; background-color: var(--cream); 
      background-image: radial-gradient(circle, #C8B99A 1px, transparent 1px); 
      background-size: 32px 32px; color: var(--text); margin: 0; padding: 60px 20px; 
    }
    
    .admin-container { width: 100%; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; }
    .page-title { font-family: 'Fraunces', serif; font-size: 2.5rem; margin: 0; color: var(--green-deep); }
    
    /* Buttons */
    .btn-outline { font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; background: transparent; border: 1.5px solid var(--green); color: var(--green); padding: 12px 24px; border-radius: var(--r-pill); text-decoration: none; transition: 0.2s; cursor: pointer; }
    .btn-outline:hover:not(:disabled) { background: var(--green-light); }
    .btn-small { padding: 6px 16px; font-size: 0.85rem; }
    .btn-disabled { opacity: 0.5; cursor: not-allowed; border-color: var(--text-soft); color: var(--text-soft); }

    /* Filters */
    .dashboard-controls { display: flex; flex-direction: column; gap: 16px; width: 100%; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; background: var(--white); padding: 16px; border-radius: var(--r-lg); border: 1.5px solid var(--cream-border); box-shadow: 0 4px 12px rgba(45,42,38,0.02); }
    .date-range-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    input[type="date"], select { padding: 10px 16px; border: 1.5px solid var(--cream-border); border-radius: var(--r-md); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; }
    input:focus, select:focus { outline: none; border-color: var(--green); }
    select.filter-select { font-weight: 600; background-color: var(--cream); cursor: pointer; }

    /* Accordion Cards */
    .roster-list { display: flex; flex-direction: column; gap: 20px; }
    
    .admin-card { background: var(--white); border: 1.5px solid var(--cream-border); border-radius: var(--r-xl); box-shadow: 0 8px 24px rgba(45,42,38,0.04); overflow: hidden; transition: all 0.2s; }
    
    .card-header { padding: 24px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; transition: background 0.2s; }
    .card-header:hover { background: var(--cream); }
    
    .header-info { display: flex; flex-direction: column; gap: 8px; }
    .header-title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .header-title-row h2 { font-family: 'Fraunces', serif; margin: 0; color: var(--green-deep); font-size: 1.4rem; }
    
    .header-meta { display: flex; gap: 16px; font-size: 0.9rem; color: var(--text-soft); }
    
    .header-actions { display: flex; align-items: center; gap: 16px; }
    .slots-badge { background: var(--green-light); color: var(--green-deep); padding: 6px 12px; border-radius: 99px; font-size: 0.85rem; font-weight: 600; border: 1px solid rgba(61, 107, 79, 0.2); }
    
    .accordion-arrow { font-size: 1.2rem; color: var(--green-deep); transition: transform 0.3s ease; }
    .admin-card.open .accordion-arrow { transform: rotate(180deg); }
    
    /* Collapsible Body */
    .card-body { display: none; padding: 0 24px 24px; border-top: 1px solid var(--cream-border); margin-top: 10px; padding-top: 24px; }
    .admin-card.open .card-body { display: block; }

    /* Status Badges */
    .status-badge { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; padding: 4px 10px; border-radius: var(--r-pill); font-weight: 600; }
    .badge-upcoming { background: var(--green-light); color: var(--green-deep); }
    .badge-past { background: #E8E5DF; color: var(--text-soft); }
    .badge-cancelled { background: var(--danger-light); color: var(--danger); }

    /* Table Styles */
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { padding: 12px 16px; background: var(--cream); color: var(--text-soft); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid var(--cream-border); border-radius: 8px 8px 0 0; }
    td { padding: 16px; border-bottom: 1px solid var(--cream-border); color: var(--text); font-size: 0.95rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--cream); }
    
    .owner-info { display: flex; flex-direction: column; }
    .owner-name { font-weight: 600; }
    .owner-contact { font-size: 0.85rem; color: var(--text-soft); }

    .empty-state { text-align: center; padding: 40px; color: var(--text-soft); font-style: italic; background: var(--white); border-radius: var(--r-xl); border: 1.5px solid var(--cream-border); }
  </style>
</head>
<body>

  <div class="admin-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1 class="page-title">📋 Customer Roster</h1>
      <a href="generate-booking.html" class="btn-outline">← Back to Generator</a>
    </div>

    <div class="dashboard-controls">
      <div class="filter-row">
        <select id="statusFilter" class="filter-select">
          <option value="all">All Sessions</option>
          <option value="upcoming">Upcoming</option>
          <option value="past">Past</option>
          <option value="cancelled">Cancelled</option>
        </select>

        <div class="date-range-group">
          <span style="font-size: 0.9rem; font-weight: 600; color: var(--text-soft);">Date Range:</span>
          <input type="date" id="startDateFilter">
          <span style="color: var(--text-soft); font-size: 0.9rem;">to</span>
          <input type="date" id="endDateFilter">
          <button class="btn-outline btn-small" id="clearDatesBtn">Clear Dates</button>
        </div>
      </div>
    </div>

    <div id="rosterContainer" class="roster-list">
      </div>

  </div>

  <script>
    // --- HARDCODED DEMO DATA ---
    const mockSessions = [
      {
        id: 1,
        title: "3-Day Spring Agility Camp",
        date: "2026-05-15", // Primary sorting/filtering date
        status: "upcoming",
        slotsTaken: 3,
        totalSlots: 6,
        bookings: [
          { dogName: "Buddy", breed: "Golden Retriever", ownerName: "John Doe", ownerContact: "john.d@example.com", bookedOn: "Apr 20, 2026" },
          { dogName: "Luna", breed: "Labrador Mix", ownerName: "Sarah Jenkins", ownerContact: "s.jenkins@email.com", bookedOn: "Apr 21, 2026" },
          { dogName: "Max", breed: "German Shepherd", ownerName: "Mike Chen", ownerContact: "mike.c@example.sg", bookedOn: "Apr 23, 2026" }
        ]
      },
      {
        id: 2,
        title: "Weekend Socialization Intensive",
        date: "2026-05-22",
        status: "upcoming",
        slotsTaken: 1,
        totalSlots: 6,
        bookings: [
          { dogName: "Daisy", breed: "Poodle", ownerName: "Test User", ownerContact: "test@fortcanning.com", bookedOn: "Apr 24, 2026" }
        ]
      },
      {
        id: 3,
        title: "Puppy Basics Bootcamp",
        date: "2026-03-10",
        status: "past",
        slotsTaken: 6,
        totalSlots: 6,
        bookings: [
          { dogName: "Charlie", breed: "Beagle", ownerName: "Alice Wong", ownerContact: "alice.w@email.com", bookedOn: "Feb 15, 2026" },
          { dogName: "Bella", breed: "Shih Tzu", ownerName: "Tom Hardy", ownerContact: "tom.h@email.com", bookedOn: "Feb 18, 2026" }
          // Truncated for demo...
        ]
      },
      {
        id: 4,
        title: "Advanced Trail Navigation",
        date: "2026-06-05",
        status: "cancelled",
        slotsTaken: 2,
        totalSlots: 6,
        bookings: [
          { dogName: "Rocky", breed: "Husky", ownerName: "David Kim", ownerContact: "dkim@email.com", bookedOn: "Apr 01, 2026" }
        ]
      }
    ];

    // --- DOM ELEMENTS ---
    const rosterContainer = document.getElementById('rosterContainer');
    const statusFilter = document.getElementById('statusFilter');
    const startDateFilter = document.getElementById('startDateFilter');
    const endDateFilter = document.getElementById('endDateFilter');
    const clearDatesBtn = document.getElementById('clearDatesBtn');

    // --- EVENT LISTENERS ---
    statusFilter.addEventListener('change', renderRoster);
    startDateFilter.addEventListener('change', renderRoster);
    endDateFilter.addEventListener('change', renderRoster);
    
    clearDatesBtn.addEventListener('click', () => {
      startDateFilter.value = '';
      endDateFilter.value = '';
      renderRoster();
    });

    // --- UTILITY ---
    function formatDateDisplay(dateStr) {
      const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
      const [year, month, day] = dateStr.split('-');
      return new Date(year, month - 1, day).toLocaleDateString('en-US', options);
    }

    function getBadgeHTML(status) {
      if (status === 'upcoming') return `<span class="status-badge badge-upcoming">Upcoming</span>`;
      if (status === 'past') return `<span class="status-badge badge-past">Past</span>`;
      if (status === 'cancelled') return `<span class="status-badge badge-cancelled">Cancelled</span>`;
      return '';
    }

    // --- TOGGLE ACCORDION ---
    window.toggleAccordion = function(id) {
      const card = document.getElementById(`session-card-${id}`);
      card.classList.toggle('open');
    };

    // --- RENDER LOGIC ---
    function renderRoster() {
      rosterContainer.innerHTML = '';
      
      const filterMode = statusFilter.value;
      const startFilterVal = startDateFilter.value ? new Date(startDateFilter.value).setHours(0,0,0,0) : null;
      const endFilterVal = endDateFilter.value ? new Date(endDateFilter.value).setHours(23,59,59,999) : null;

      // Filter Data
      const filteredSessions = mockSessions.filter(session => {
        // Status Check
        if (filterMode !== 'all' && session.status !== filterMode) return false;

        // Date Range Check
        if (startFilterVal !== null || endFilterVal !== null) {
          const [year, month, day] = session.date.split('-');
          const sessionTime = new Date(year, month - 1, day).getTime();
          
          let matchesStart = true;
          let matchesEnd = true;
          
          if (startFilterVal !== null) matchesStart = sessionTime >= startFilterVal;
          if (endFilterVal !== null) matchesEnd = sessionTime <= endFilterVal;
          
          if (!(matchesStart && matchesEnd)) return false;
        }

        return true;
      });

      // Handle Empty State
      if (filteredSessions.length === 0) {
        rosterContainer.innerHTML = `<div class="empty-state">No sessions match your filter criteria.</div>`;
        return;
      }

      // Render Cards
      filteredSessions.forEach(session => {
        
        // Build the table rows for dogs
        let rowsHTML = '';
        if (session.bookings.length === 0) {
          rowsHTML = `<tr><td colspan="5" style="text-align:center; color: var(--text-soft); font-style: italic;">No dogs booked for this session yet.</td></tr>`;
        } else {
          session.bookings.forEach(booking => {
            rowsHTML += `
              <tr>
                <td><strong>${booking.dogName}</strong></td>
                <td>${booking.breed}</td>
                <td class="owner-info">
                  <span class="owner-name">${booking.ownerName}</span>
                  <span class="owner-contact">${booking.ownerContact}</span>
                </td>
                <td>${booking.bookedOn}</td>
                <td style="text-align: right;">
                  <button class="btn-outline btn-small btn-disabled" disabled>View Profile</button>
                </td>
              </tr>
            `;
          });
        }

        const cardHTML = `
          <div class="admin-card ${session.status === 'cancelled' ? 'cancelled' : ''}" id="session-card-${session.id}">
            
            <div class="card-header" onclick="toggleAccordion(${session.id})">
              <div class="header-info">
                <div class="header-title-row">
                  <h2>${session.title}</h2>
                  ${getBadgeHTML(session.status)}
                </div>
                <div class="header-meta">
                  <span>📅 Starts: ${formatDateDisplay(session.date)}</span>
                </div>
              </div>
              
              <div class="header-actions">
                <div class="slots-badge">${session.slotsTaken} / ${session.totalSlots} Slots Taken</div>
                <div class="accordion-arrow">▼</div>
              </div>
            </div>

            <div class="card-body">
              <table>
                <thead>
                  <tr>
                    <th>Dog Name</th>
                    <th>Breed</th>
                    <th>Owner Details</th>
                    <th>Booking Date</th>
                    <th style="text-align: right;">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  ${rowsHTML}
                </tbody>
              </table>
            </div>

          </div>
        `;
        
        rosterContainer.insertAdjacentHTML('beforeend', cardHTML);
      });
    }

    // Initialize Page
    renderRoster();

  </script>
</body>
</html>
