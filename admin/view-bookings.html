<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal – View Bookings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root { 
      --cream: #F9F8F6; --cream-border: #E8E5DF; --green: #3D6B4F; 
      --green-deep: #274734; --green-light: #EAF3EC; --text: #2D2A26; 
      --text-soft: #5C5955; --white: #FFFFFF; --danger: #D9534F; 
      --r-md: 12px; --r-lg: 16px; --r-xl: 24px; --r-pill: 99px; 
    }
    
    body { 
      font-family: 'DM Sans', sans-serif; background-color: var(--cream); 
      background-image: radial-gradient(circle, #C8B99A 1px, transparent 1px); 
      background-size: 32px 32px; color: var(--text); margin: 0; padding: 0; 
    }
    
    /* Navigation Bar */
    .nav-bar {
      background: var(--white);
      border-bottom: 1.5px solid var(--cream-border);
      padding: 0 40px;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-sizing: border-box;
    }
    .nav-logo { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 600; color: var(--green-deep); text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { text-decoration: none; color: var(--text-soft); font-weight: 500; font-size: 0.9rem; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--green); }

    .admin-container { width: 100%; max-width: 900px; margin: 40px auto; display: flex; flex-direction: column; gap: 40px; padding: 0 20px; }
    .page-title { font-family: 'Fraunces', serif; font-size: 2.5rem; margin: 0; color: var(--green-deep); }
    .filter-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; background: var(--white); padding: 16px; border-radius: var(--r-lg); border: 1.5px solid var(--cream-border); }
    .admin-card { background: var(--white); border: 1.5px solid var(--cream-border); border-radius: var(--r-xl); box-shadow: 0 8px 24px rgba(45,42,38,0.04); overflow: hidden; margin-bottom: 20px; }
    .card-header { padding: 24px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .card-body { padding: 0 24px 24px; border-top: 1px solid var(--cream-border); padding-top: 24px; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 12px; text-align: left; background: var(--cream); color: var(--text-soft); font-size: 0.85rem; }
    td { padding: 16px; border-bottom: 1px solid var(--cream-border); font-size: 0.95rem; }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a href="index.html" class="nav-logo">🌿 Admin Portal</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="generate-booking.html">Generate Booking</a>
      <a href="view-bookings.html" class="active">View Bookings</a>
      <a href="#">External Users</a>
    </div>
  </nav>

  <div class="admin-container">
    <h1 class="page-title">📋 Customer Roster</h1>

    <div class="filter-row">
      <select id="statusFilter" style="padding: 10px; border-radius: 8px; border: 1px solid var(--cream-border);">
        <option value="all">All Sessions</option>
        <option value="upcoming">Upcoming</option>
      </select>
      <input type="date" id="startDateFilter" style="padding: 10px; border-radius: 8px; border: 1px solid var(--cream-border);">
    </div>

    <div id="rosterContainer">
      </div>
  </div>

  <script>
    /* Roster rendering logic remains identical to your original view-bookings.html file */
    const mockSessions = [
      { id: 1, title: "3-Day Spring Agility Camp", date: "2026-05-15", status: "upcoming", slotsTaken: 3, totalSlots: 6, bookings: [{ dogName: "Buddy", breed: "Golden Retriever", ownerName: "John Doe", ownerContact: "john.d@example.com", bookedOn: "Apr 20, 2026" }] }
    ];

    function renderRoster() {
      const container = document.getElementById('rosterContainer');
      container.innerHTML = '';
      mockSessions.forEach(session => {
        const card = document.createElement('div');
        card.className = 'admin-card';
        card.innerHTML = `
          <div class="card-header">
            <div>
              <h2 style="margin:0; font-family: 'Fraunces', serif;">${session.title}</h2>
              <span style="font-size: 0.8rem; color: var(--text-soft);">📅 Starts: ${session.date}</span>
            </div>
            <div style="background: var(--green-light); padding: 8px 16px; border-radius: 99px; font-weight: 600;">${session.slotsTaken}/${session.totalSlots} Slots</div>
          </div>
          <div class="card-body">
            <table>
              <thead><tr><th>Dog Name</th><th>Breed</th><th>Owner</th><th>Date</th></tr></thead>
              <tbody>${session.bookings.map(b => `<tr><td>${b.dogName}</td><td>${b.breed}</td><td>${b.ownerName}</td><td>${b.bookedOn}</td></tr>`).join('')}</tbody>
            </table>
          </div>
        `;
        container.appendChild(card);
      });
    }
    renderRoster();
  </script>
</body>
</html>
