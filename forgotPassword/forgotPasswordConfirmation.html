<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Link Sent – Fort Canning Dog Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">

  <style>
    body.login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--cream, #F9F8F6);
      background-image: radial-gradient(circle, #C8B99A 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .login-card {
      background: var(--white, #FFFFFF);
      border: 1.5px solid var(--cream-border, #E8E5DF);
      border-radius: var(--r-xl, 24px);
      box-shadow: var(--shadow-lg, 0 12px 32px rgba(45,42,38,0.06));
      padding: 56px 44px 48px;
      width: 100%;
      max-width: 460px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .login-card::before {
      content: "🐾";
      font-size: 160px;
      position: absolute;
      bottom: -30px;
      right: -20px;
      opacity: 0.045;
      pointer-events: none;
      line-height: 1;
    }

    .icon-circle {
      width: 72px;
      height: 72px;
      background: var(--green-light, #EAF3EC);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
      color: var(--green, #3D6B4F);
    }

    .login-heading {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.6rem, 4vw, 2rem);
      font-weight: 600;
      color: var(--text, #2D2A26);
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .login-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text-soft, #5C5955);
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .btn-login {
      background: var(--green, #3D6B4F);
      color: var(--white, #FFFFFF);
      font-family: 'Fraunces', serif;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--r-pill, 99px);
      padding: 14px 32px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 16px rgba(61,107,79,.28);
      transition: background .18s, transform .12s, box-shadow .18s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-login:hover {
      background: var(--green-deep, #274734);
      transform: translateY(-1px);
    }
    
    .footer-text {
      text-align: center;
      padding: 20px;
      font-size: 0.78rem;
      color: var(--text-soft, #5C5955);
      font-family: 'DM Sans', sans-serif;
    }
  </style>
</head>

<body class="login-page">

  <nav class="nav" id="mainNav">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">
        <div class="nav-logo-icon">🐾</div>
        <div class="nav-logo-text">
          Fort Canning
          <span class="nav-logo-sub">Dog Camp · Singapore</span>
        </div>
      </a>
    </div>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      
      <div class="icon-circle">📬</div>
      <h1 class="login-heading">Check your inbox!</h1>
      <p class="login-sub">We have sent a password reset link to your email address. Please click the link in the email to create a new password.</p>

      <a href="../login.html" class="btn-login">Back to Log In</a>

    </div>
  </div>

  <div class="footer-text">
    © 2026 Fort Canning Dog Camp &nbsp;·&nbsp; Made with 🐾 in Singapore
  </div>

</body>
</html>
