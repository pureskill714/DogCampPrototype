<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – Fort Canning Dog Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">

  <style>
    body.login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--cream, #F9F8F6);
      background-image: radial-gradient(circle, #C8B99A 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .login-card {
      background: var(--white, #FFFFFF);
      border: 1.5px solid var(--cream-border, #E8E5DF);
      border-radius: var(--r-xl, 24px);
      box-shadow: var(--shadow-lg, 0 12px 32px rgba(45,42,38,0.06));
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 460px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .login-card::before {
      content: "🐾";
      font-size: 160px;
      position: absolute;
      bottom: -30px;
      right: -20px;
      opacity: 0.045;
      pointer-events: none;
      line-height: 1;
    }

    .login-heading {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.6rem, 4vw, 2rem);
      font-weight: 600;
      color: var(--text, #2D2A26);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .login-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text-soft, #5C5955);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: left;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text, #2D2A26);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-input {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text, #2D2A26);
      background: var(--cream, #F9F8F6);
      border: 1.5px solid var(--cream-border, #E8E5DF);
      border-radius: var(--r-md, 8px);
      padding: 12px 16px;
      outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
      width: 100%;
    }

    .form-input:focus {
      border-color: var(--green, #3D6B4F);
      background: var(--white, #FFFFFF);
      box-shadow: 0 0 0 3px rgba(61,107,79,.1);
    }

    .login-error {
      display: none;
      background: #fdecea;
      color: #E05C4A;
      border: 1px solid #f5c6cb;
      padding: 10px 14px;
      border-radius: var(--r-md, 8px);
      font-size: 0.85rem;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-login {
      background: var(--green, #3D6B4F);
      color: var(--white, #FFFFFF);
      font-family: 'Fraunces', serif;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--r-pill, 99px);
      padding: 14px 32px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 16px rgba(61,107,79,.28);
      transition: background .18s, transform .12s, box-shadow .18s;
      margin-top: 12px;
    }

    .btn-login:hover {
      background: var(--green-deep, #274734);
      transform: translateY(-1px);
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text-soft, #5C5955);
      text-decoration: none;
      transition: color .15s;
    }

    .back-link:hover {
      color: var(--green, #3D6B4F);
      text-decoration: underline;
    }
    
    .footer-text {
      text-align: center;
      padding: 20px;
      font-size: 0.78rem;
      color: var(--text-soft, #5C5955);
      font-family: 'DM Sans', sans-serif;
    }
  </style>
</head>

<body class="login-page">

  <nav class="nav" id="mainNav">
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">
        <div class="nav-logo-icon">🐾</div>
        <div class="nav-logo-text">
          Fort Canning
          <span class="nav-logo-sub">Dog Camp · Singapore</span>
        </div>
      </a>
    </div>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">

      <h1 class="login-heading">Forgot Password? 🦴</h1>
      <p class="login-sub">Enter the email address associated with your account, and we’ll send you a link to reset your password.</p>

      <form class="login-form" id="forgotForm">
        
        <div class="login-error" id="forgotError">
          Email not found in our database.
        </div>

        <div class="form-group">
          <label class="form-label" for="email">📧 Email address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="e.g., test@example.com"
            required
          >
        </div>

        <button class="btn-login" type="submit">
          Send Reset Link
        </button>
      </form>

      <a href="../login.html" class="back-link">← Back to Log In</a>

    </div>
  </div>

  <div class="footer-text">
    © 2026 Fort Canning Dog Camp &nbsp;·&nbsp; Made with 🐾 in Singapore
  </div>

  <script>
    const forgotForm = document.getElementById('forgotForm');
    const forgotError = document.getElementById('forgotError');

    forgotForm.addEventListener('submit', function(event) {
      event.preventDefault(); 

      const emailValue = document.getElementById('email').value.trim();
      const TEST_EMAIL = "test@example.com";

      if (emailValue.toLowerCase() === TEST_EMAIL) {
        forgotError.style.display = 'none';
        // Redirection stays the same since they are in the same folder
        window.location.href = 'forgotPasswordConfirmation.html'; 
      } else {
        forgotError.style.display = 'block';
        forgotError.textContent = 'Email not found in our database.';
      }
    });
  </script>

</body>
</html>
