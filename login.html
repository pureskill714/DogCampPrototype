<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In – Fort Canning Dog Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    body.login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--cream);
      background-image: radial-gradient(circle, #C8B99A 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .nav-bar {
      background: var(--white);
      border-bottom: 1.5px solid var(--cream-border);
      padding: 0 40px;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-sizing: border-box;
    }
    .nav-logo { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 600; color: var(--green-deep); text-decoration: none; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { text-decoration: none; color: var(--text-soft); font-weight: 500; font-size: 0.9rem; }
    .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }
    .login-card { background: var(--white); border: 1.5px solid var(--cream-border); border-radius: var(--r-xl); box-shadow: var(--shadow-lg); padding: 48px 44px 40px; width: 100%; max-width: 460px; position: relative; }
    .login-heading { font-family: 'Fraunces', serif; font-size: clamp(1.6rem, 4vw, 2rem); font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .login-heading em { color: var(--green); font-style: italic; }
    .login-form { display: flex; flex-direction: column; gap: 18px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-input { font-family: 'DM Sans', sans-serif; font-size: 0.95rem; background: var(--cream); border: 1.5px solid var(--cream-border); border-radius: var(--r-md); padding: 12px 16px; box-sizing: border-box; width: 100%; }
    .login-error { display: none; background: #fdecea; color: #E05C4A; padding: 10px; border-radius: var(--r-md); font-size: 0.85rem; text-align: center; border: 1px solid #f5c6cb; }
    .btn-login { background: var(--green); color: var(--white); font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 600; border: none; border-radius: var(--r-pill); padding: 14px 32px; cursor: pointer; width: 100%; margin-top: 10px; }
    .login-register { text-align: center; font-size: 0.88rem; color: var(--text-soft); margin-top: 20px; padding-top: 20px; border-top: 1.5px solid var(--cream-border); }
    .login-register a { color: var(--green); font-weight: 600; text-decoration: none; }
  </style>
</head>

<body class="login-page">

  <nav class="nav-bar">
    <a href="index.html" class="nav-logo">🌿 Admin Portal</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="login.html" style="color: var(--green);">Log In</a>
      <a href="registration/register.html">Register</a>
    </div>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <h1 class="login-heading">Welcome <em>back!</em> 🐶</h1>
      <p style="color: var(--text-faint); font-size: 0.9rem; margin-bottom: 32px;">Log in to manage your pup's profile and bookings.</p>

      <form class="login-form" id="loginForm">
        <div class="login-error" id="loginError">Incorrect email or password.</div>

        <div class="form-group">
          <label style="font-size: 0.85rem; font-weight: 500;">📧 Email address</label>
          <input class="form-input" type="email" id="email" placeholder="test@example.com" required>
        </div>

        <div class="form-group">
          <label style="font-size: 0.85rem; font-weight: 500;">🔒 Password</label>
          <input class="form-input" type="password" id="password" placeholder="password123" required>
        </div>

        <button class="btn-login" type="submit">Let's go! 🐾</button>
      </form>

      <div class="login-register">
        Not yet a member? <a href="registration/register.html">Register here! 🐕</a>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');

    loginForm.addEventListener('submit', function(event) {
      event.preventDefault();

      const emailValue = document.getElementById('email').value;
      const passwordValue = document.getElementById('password').value;

      // Hardcoded Test Account
      const TEST_EMAIL = "test@example.com";
      const TEST_PASSWORD = "password123";

      // LocalStorage Accounts
      const registeredUsers = JSON.parse(localStorage.getItem('registeredUsers')) || [];
      const foundUser = registeredUsers.find(user => user.email === emailValue && user.password === passwordValue);

      if ((emailValue === TEST_EMAIL && passwordValue === TEST_PASSWORD) || foundUser) {
        loginError.style.display = 'none';
        
        // Store current user session name
        const displayName = foundUser ? foundUser.firstName : "Admin";
        localStorage.setItem('currentUser', displayName);
        
        window.location.href = 'dashboard/index.html'; 
      } else {
        loginError.style.display = 'block';
      }
    });
  </script>
</body>
</html>
