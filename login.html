<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In – Fort Canning Dog Camp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    :root { 
      --cream: #F9F8F6; --cream-border: #E8E5DF; --green: #3D6B4F; 
      --green-deep: #274734; --green-light: #EAF3EC; --text: #2D2A26; 
      --text-soft: #5C5955; --white: #FFFFFF; --danger: #D9534F; 
      --danger-light: #FDF2F2; --r-md: 12px; --r-lg: 16px; --r-xl: 24px; --r-pill: 99px; 
    }

    body.login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--cream);
      background-image: radial-gradient(circle, #C8B99A 1px, transparent 1px);
      background-size: 32px 32px;
      margin: 0;
    }

    /* ── Login Card UI ── */
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .login-card {
      background: var(--white);
      border: 1.5px solid var(--cream-border);
      border-radius: var(--r-xl);
      box-shadow: 0 10px 30px rgba(45,42,38,0.05);
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 460px;
      position: relative;
      overflow: hidden;
    }

    .login-heading {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.8rem, 4vw, 2.2rem);
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .login-heading em {
      color: var(--green);
      font-style: italic;
    }

    .login-sub {
      font-size: 0.95rem;
      color: var(--text-soft);
      margin-bottom: 32px;
    }

    /* ── Form ── */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .form-input {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      background: var(--cream);
      border: 1.5px solid var(--cream-border);
      border-radius: var(--r-md);
      padding: 14px 16px;
      box-sizing: border-box;
      width: 100%;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--green);
      background: var(--white);
    }

    .login-error {
      display: none;
      background: var(--danger-light);
      color: var(--danger);
      padding: 12px;
      border-radius: var(--r-md);
      font-size: 0.85rem;
      text-align: center;
      border: 1px solid rgba(217, 83, 79, 0.15);
    }

    .btn-login {
      background: var(--green);
      color: var(--white);
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--r-pill);
      padding: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .btn-login:hover {
      background: var(--green-deep);
    }

    .login-register {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-soft);
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1.5px solid var(--cream-border);
    }

    .login-register a {
      color: var(--green);
      font-weight: 600;
      text-decoration: none;
    }

    .login-register a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body class="login-page">

  <nav class="nav" id="mainNav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">🐾</div>
        <div class="nav-logo-text">
          Fort Canning
          <span class="nav-logo-sub">Dog Camp · Singapore</span>
        </div>
      </a>

      <ul class="nav-links">
        <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="index.html#about" class="nav-link">About Us</a></li>
        <li class="nav-item"><a href="index.html#contact" class="nav-link">Contact Us</a></li>
        <li class="nav-item"><a href="index.html#faqs" class="nav-link">FAQs</a></li>
      </ul>

      <div class="nav-cta">
        <a href="login.html" class="btn btn-ghost active">Log In</a>
        <a href="registration/register.html" class="btn btn-outline">Register</a>
      </div>

      <button class="nav-burger" id="navBurger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="nav-mobile" id="navMobile">
    <a href="index.html">Home</a>
    <a href="index.html#about">About Us</a>
    <a href="index.html#contact">Contact Us</a>
    <a href="index.html#faqs">FAQs</a>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">
      <a href="login.html" class="btn btn-outline" style="width:100%;justify-content:center;">Log In</a>
      <a href="registration/register.html" class="btn btn-primary" style="width:100%;justify-content:center;">Register</a>
    </div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <h1 class="login-heading">Welcome <em>back!</em> 🐶</h1>
      <p class="login-sub">Log in to manage your pup's profile and camp bookings.</p>

      <form class="login-form" id="loginForm">
        <div class="login-error" id="loginError">Incorrect email or password.</div>

        <div class="form-group">
          <label class="form-label">📧 Email address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">🔒 Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required>
        </div>

        <button class="btn-login" type="submit">Let's go! 🐾</button>
      </form>

      <div class="login-register">
        Not yet a member? <a href="registration/register.html">Register here! 🐕</a>
      </div>
    </div>
  </div>

  <script>
    // ── Sticky nav shadow ──
    const nav = document.getElementById('mainNav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    });

    // ── Mobile burger ──
    const burger = document.getElementById('navBurger');
    const mobileNav = document.getElementById('navMobile');
    burger.addEventListener('click', () => {
      const open = mobileNav.classList.toggle('open');
      burger.classList.toggle('open', open);
      document.body.style.overflow = open ? 'hidden' : '';
    });

    // ── Login Logic ──
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');

    loginForm.addEventListener('submit', function(event) {
      event.preventDefault();

      const emailValue = document.getElementById('email').value;
      const passwordValue = document.getElementById('password').value;

      // 1. Admin Hardcoded Credentials
      const ADMIN_EMAIL = "admin@fortcanning.com";
      const ADMIN_PASS = "fortcanning2026";

      // 2. Hardcoded Test Account
      const TEST_EMAIL = "test@example.com";
      const TEST_PASSWORD = "password123";

      // 3. LocalStorage Accounts
      const registeredUsers = JSON.parse(localStorage.getItem('registeredUsers')) || [];
      const foundUser = registeredUsers.find(user => 
        user.email === emailValue && user.password === passwordValue
      );

      // --- AUTHENTICATION FLOW ---

      // Check for Admin first
      if (emailValue === ADMIN_EMAIL && passwordValue === ADMIN_PASS) {
        window.location.href = 'admin/index.html';
      } 
      // Check for regular user accounts
      else if ((emailValue === TEST_EMAIL && passwordValue === TEST_PASSWORD) || foundUser) {
        loginError.style.display = 'none';
        
        // Save user session
        localStorage.setItem('userEmail', emailValue);
        localStorage.setItem('currentUser', foundUser ? foundUser.firstName : "Test User");
        
        window.location.href = 'dashboard/index.html'; 
      } 
      // Failed login
      else {
        loginError.style.display = 'block';
      }
    });
  </script>
</body>

</html>
